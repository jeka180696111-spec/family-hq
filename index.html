<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#F8FAF9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Сімейний бюджет</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">

<!-- Шрифти -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

<!-- Іконки -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">

<!-- Стилі (плоска структура) -->
<link rel="stylesheet" href="base.css">
<link rel="stylesheet" href="layout.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="pages.css">
<!-- Fallback: якщо CSS в папці css/ -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/pages.css">

<!-- Firebase SDK (compat mode — працює з <script>, без bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ─── Екран авторизації ────────────────────────────────── -->
<div id="login-screen" class="auth-screen" style="display:flex">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="ti ti-home-2"></i>
    </div>
    <h1 class="auth-title">Сімейний бюджет</h1>
    <p class="auth-text">Увійди через Google щоб синхронізувати дані</p>
    <button id="google-signin-btn" class="auth-google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.92a8.78 8.78 0 0 0 2.68-6.62Z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A9 9 0 0 0 9 18Z" fill="#34A853"/><path d="M3.97 10.71A5.41 5.41 0 0 1 3.69 9c0-.59.1-1.17.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33Z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.96l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58Z" fill="#EA4335"/></svg>
      <span>Увійти через Google</span>
    </button>
    <div id="login-error" class="auth-error" style="display:none"></div>
  </div>
</div>

<!-- ─── Основний додаток ─────────────────────────────────── -->
<div id="app-root" class="app" style="display:none">

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- Топбар -->
  <header id="topbar" class="topbar"></header>

  <!-- Сторінки -->
  <main id="content" class="content">
    <section id="page-dashboard" class="page active"></section>
    <section id="page-wallets" class="page"></section>
    <section id="page-operations" class="page"></section>
    <section id="page-analytics" class="page"></section>
    <section id="page-reserve" class="page"></section>
    <section id="page-goals" class="page"></section>
    <section id="page-settings" class="page"></section>
  </main>

  <!-- Курси валют -->
  <div id="fx-bar" class="fx-bar"></div>

  <!-- Нижня навігація (мобілка) -->
  <nav id="bottom-nav" class="bottom-nav"></nav>

</div>

<!-- Підключаємо модулі -->
<script type="module">
  // Пробуємо завантажити main.js з кореня, якщо не знайде — з js/
  import('./main.js').catch(() => import('./js/main.js'));
</script>

</body>
</html>
